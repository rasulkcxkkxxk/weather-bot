name: Weather Bot

on:
  schedule:
    - cron: "0 */12 * * *"  # her 12 saat
  workflow_dispatch:        # manuel çalıştırma

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu çek
        uses: actions/checkout@v3

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Kütüphaneleri yükle
        run: pip install -r requirements.txt

      - name: Botu çalıştır
        run: python main.py
